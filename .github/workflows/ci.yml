name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: blackbox
          POSTGRES_PASSWORD: blackbox
          POSTGRES_USER: blackbox
        options: >-
          --health-cmd "pg_isready -U blackbox -d blackbox"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://blackbox:blackbox@localhost:5432/blackbox
      REDIS_URL: redis://localhost:6379
      RUN_DEPENDENCY_INTEGRATION: 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high
      - run: docker compose -f deploy/docker-compose.yml config --quiet
      - run: pnpm db:generate
      - run: pnpm db:validate
      - run: pnpm db:migrate
      - run: pnpm test:source-smoke
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:integration
      - run: pnpm build
      - run: pnpm test:overhead:phase5
      - run: pnpm test:load:phase5
      - run: pnpm test:smoke

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blackbox
      POSTGRES_PASSWORD: blackbox
      POSTGRES_USER: blackbox
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U blackbox -d blackbox']
      interval: 2s
      timeout: 3s
      retries: 15
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - blackbox-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 3s
      retries: 15
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - blackbox-redis:/data

volumes:
  blackbox-postgres:
  blackbox-redis:
